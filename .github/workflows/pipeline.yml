name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── STAGE 1: LINT ──────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install flake8
      - run: flake8 api/ --max-line-length=100
      - run: flake8 worker/ --max-line-length=100

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: cd frontend && npm ci && npx eslint . || true

      - name: Lint API Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: api/Dockerfile
          ignore: DL3042,DL3013,DL3008

      - name: Lint Worker Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: worker/Dockerfile
          ignore: DL3042,DL3013,DL3008

      - name: Lint Frontend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        continue-on-error: true
        with:
          dockerfile: frontend/Dockerfile
          ignore: DL3042,DL3013,DL3008

  # ── STAGE 2: TEST ──────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ── STAGE 3: BUILD ─────────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: localhost:5000/api:${{ github.sha }},localhost:5000/api:latest
          network: host

      - name: Build and push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: localhost:5000/worker:${{ github.sha }},localhost:5000/worker:latest
          network: host

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: localhost:5000/frontend:${{ github.sha }},localhost:5000/frontend:latest
          network: host

  # ── STAGE 4: SECURITY SCAN ─────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: build
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@v4

      - name: Build images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      # Table format scans (Building-breaking steps)
      - name: Scan API image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      # SARIF generation (Reporting steps - always run)
      - name: Generate SARIF for API
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: sarif
          output: trivy-api.sarif
          severity: CRITICAL
          exit-code: 0
          ignore-unfixed: true

      - name: Generate SARIF for Worker
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: sarif
          output: trivy-worker.sarif
          severity: CRITICAL
          exit-code: 0
          ignore-unfixed: true

      - name: Generate SARIF for Frontend
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: sarif
          output: trivy-frontend.sarif
          severity: CRITICAL
          exit-code: 0
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: "*.sarif"

  # ── STAGE 5: INTEGRATION TEST ──────────────────────────────────────────────
  integration:
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_HOST=redis" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Start full stack
        run: docker compose up -d --build

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for stack to be ready..."
          sleep 30
          docker compose ps

      - name: Submit job and poll until completed
        run: |
          RESPONSE=$(curl -sf http://localhost:3000/submit \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{"task":"integration-test"}')
          echo "Submit response: $RESPONSE"

          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"

          for i in $(seq 1 12); do
            STATUS=$(curl -sf http://localhost:3000/status/$JOB_ID | \
              python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Integration test passed"
              exit 0
            fi
            sleep 5
          done

          echo "Integration test failed"
          docker compose logs
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  # ── STAGE 6: DEPLOY ────────────────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m  # Increased for safety
          script: |
            set -e
            cd /home/hngdevops/hng14-stage2-devops

            OLD_SHA=$(git rev-parse HEAD)
            git fetch origin main
            git reset --hard origin/main

            # Prune old images to keep disk clear
            docker system prune -f 

            docker compose down --remove-orphans || true
            docker compose up -d --build

            echo "Waiting for health checks..."
            for i in $(seq 1 12); do
              HEALTHY=$(docker compose ps | grep -c "healthy" || true)
              echo "Attempt $i: $HEALTHY healthy services"
              if [ "$HEALTHY" -ge 3 ]; then
                echo "Deploy successful"
                exit 0
              fi
              sleep 10
            done

            echo "Health checks failed — rolling back"
            git reset --hard "$OLD_SHA"
            docker compose up -d --build
            exit 1